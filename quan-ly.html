<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GEIC Workspace | Hệ thống Quản lý</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- REACT & BABEL CDNs FOR CALENDAR -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* === CORE VARIABLES & STYLES === */
        html { scroll-behavior: smooth; }
        body { font-family: 'Inter', sans-serif; background: #f4f7f9; overflow: hidden; color: #0f172a; background-image: radial-gradient(circle at 15% 50%, rgba(220, 38, 38, 0.04), transparent 25%), radial-gradient(circle at 85% 30%, rgba(37, 99, 235, 0.04), transparent 25%);}
        
        /* SIDEBAR & NAV */
        .glass-sidebar { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(20px); border-right: 1px solid rgba(255, 255, 255, 0.9); transition: all 0.4s; box-shadow: 4px 0 24px rgba(0,0,0,0.02);}
        .nav-item { transition: all 0.3s; position: relative; }
        .nav-item:hover { background: linear-gradient(90deg, rgba(220, 38, 38, 0.05) 0%, transparent 100%); }
        .nav-item.active { background: #dc2626; color: white; box-shadow: 0 10px 15px -3px rgba(220, 38, 38, 0.3); }
        .sidebar-expanded { width: 260px; }
        
        .content-area { height: calc(100vh - 64px); overflow-y: auto; overflow-x: hidden;}
        
        /* === GLASSMORPHISM & 5D === */
        .glass-panel { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.9); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .hover-5d { transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.15); }
        .hover-5d:hover { transform: translateY(-5px) scale(1.02); box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1), 0 10px 10px -5px rgba(0,0,0,0.04); border-color: #e2e8f0; z-index: 10;}
        
        table th { white-space: nowrap; font-size: 11px; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; border-bottom: 2px solid #e2e8f0; padding: 12px; }
        table td { white-space: nowrap; transition: all 0.2s; padding: 12px; font-size: 13px; border-bottom: 1px solid #f1f5f9; } 
        tr.table-row-5d:hover { background-color: #f8fafc; box-shadow: inset 2px 0 0 0 #dc2626; }
        
        /* Modals & Scrollbar */
        .modal { display: none; opacity: 0; transition: opacity 0.3s ease; z-index: 9999; }
        .modal.active { display: flex; opacity: 1; }
        .modal-content { transform: scale(0.95) translateY(20px); opacity: 0; transition: all 0.4s; }
        .modal.active .modal-content { transform: scale(1) translateY(0); opacity: 1; }
        
        .custom-scrollbar::-webkit-scrollbar { height: 6px; width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        /* Process Step Styles */
        .step-number { position: absolute; top: -15px; left: -15px; width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; color: white; box-shadow: 0 4px 10px rgba(0,0,0,0.1); z-index: 2;}
        .form-input { w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-sm font-medium outline-none focus:border-red-400 transition }
    </style>
</head>
<body class="antialiased">

    <div class="flex h-screen">
        <!-- SIDEBAR -->
        <aside id="sidebar" class="glass-sidebar sidebar-expanded flex flex-col z-50">
            <div class="p-4 flex items-center justify-center border-b border-slate-100 h-16">
                <img src="https://geic.vn/wp-content/uploads/2025/10/logo-Gtel-GEIC-latest_28102025_co-vien-trang-ver-2-1.svg" class="h-8 drop-shadow-md">
            </div>

            <nav class="flex-1 p-4 space-y-2 overflow-y-auto custom-scrollbar">
                <div onclick="switchTab('tong-quan')" class="nav-item active flex items-center p-3 rounded-xl cursor-pointer gap-4">
                    <i class="fas fa-chart-pie w-6 text-center"></i><span class="font-bold text-sm">Tổng quan</span>
                </div>
                <div onclick="switchTab('quy-trinh')" class="nav-item flex items-center p-3 rounded-xl cursor-pointer gap-4">
                    <i class="fas fa-project-diagram w-6 text-center"></i><span class="font-bold text-sm">Quy trình</span>
                </div>
                <div onclick="switchTab('bao-cao')" class="nav-item flex items-center p-3 rounded-xl cursor-pointer gap-4">
                    <i class="fas fa-chart-line w-6 text-center"></i><span class="font-bold text-sm">Báo cáo & Phân tích</span>
                </div>
                <div onclick="switchTab('hoi-nghi')" class="nav-item flex items-center p-3 rounded-xl cursor-pointer gap-4">
                    <i class="fas fa-users-viewfinder w-6 text-center"></i><span class="font-bold text-sm">Hội nghị</span>
                </div>
                <div onclick="switchTab('ho-tro')" class="nav-item flex items-center p-3 rounded-xl cursor-pointer gap-4">
                    <i class="fas fa-headset w-6 text-center"></i><span class="font-bold text-sm">Hỗ trợ</span>
                </div>
            </nav>

            <div class="p-4 border-t border-slate-100 bg-slate-50/50">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-full bg-gradient-to-tr from-red-600 to-rose-500 flex items-center justify-center text-white font-bold shadow-lg">AM</div>
                    <div class="overflow-hidden">
                        <p class="text-sm font-black text-slate-800">Admin Quản lý</p>
                        <p class="text-[11px] font-bold text-slate-400">admin@geic.vn</p>
                    </div>
                </div>
            </div>
        </aside>

        <!-- MAIN LAYOUT -->
        <div class="flex-1 flex flex-col overflow-hidden relative">
            <header class="h-16 glass-panel border-b border-slate-100 flex items-center justify-between px-6 z-40">
                <h2 id="header-title" class="text-xl font-black text-slate-800">Tổng quan Hệ thống</h2>
                <div class="w-10 h-10 rounded-xl bg-slate-50 flex items-center justify-center text-slate-600 border border-slate-200">
                    <i class="far fa-bell text-lg"></i>
                </div>
            </header>

            <!-- DYNAMIC CONTENT AREA -->
            <main class="content-area p-6 lg:p-8" id="main-tab-container">
                <!-- Nội dung render qua JS -->
            </main>
        </div>
    </div>

    <!-- MODAL CONFIRM DELETE -->
    <div id="deleteModal" class="modal fixed inset-0 bg-slate-900/80 backdrop-blur-sm items-center justify-center p-4">
        <div class="modal-content bg-white w-full max-w-sm rounded-3xl p-8 shadow-2xl text-center relative border border-white">
            <button onclick="closeModal('deleteModal')" class="absolute top-4 right-4 text-slate-400 hover:text-slate-600 w-8 h-8 rounded-full hover:bg-slate-100"><i class="fas fa-times"></i></button>
            <div class="w-16 h-16 bg-red-50 text-red-500 rounded-full flex items-center justify-center mx-auto mb-4 text-2xl border border-red-100 shadow-inner"><i class="fas fa-shield-alt"></i></div>
            <h3 class="text-xl font-black text-slate-800 mb-2">Xác thực xóa dữ liệu</h3>
            <p class="text-xs text-slate-500 mb-6 font-medium">Nhập mật khẩu quản trị để xác nhận xóa.</p>
            <input type="password" id="deletePassword" placeholder="••••••" class="w-full text-center border-2 border-slate-100 bg-slate-50 rounded-2xl px-4 py-3 font-mono text-xl tracking-[0.3em] focus:border-red-400 outline-none mb-6">
            <button onclick="executeDelete()" class="w-full py-3 rounded-xl font-bold text-white bg-red-600 hover:bg-red-700 shadow-lg transition">Xóa dữ liệu</button>
        </div>
    </div>

    <!-- SCRIPT CHÍNH -->
    <script>
        // --- 1. BIẾN TOÀN CỤC & INIT ---
        const DEL_PASSWORD = "250388";
        let deleteInfo = { type: '', index: -1 }; // Lưu thông tin item cần xóa
        let chartInstances = {}; // Lưu trữ biểu đồ để hủy khi render lại

        window.onload = () => {
            initSampleData(); // Khởi tạo dữ liệu mẫu nếu rỗng
            switchTab('tong-quan');
        };

        function getDB(key) { return JSON.parse(localStorage.getItem(key)) || []; }
        function setDB(key, data) { localStorage.setItem(key, JSON.stringify(data)); }

        // Dữ liệu mẫu ban đầu
        function initSampleData() {
            if(!localStorage.getItem('geic_reports')) setDB('geic_reports', []);
            if(!localStorage.getItem('geic_cars')) setDB('geic_cars', []);
            if(!localStorage.getItem('geic_costs')) setDB('geic_costs', []);
            if(!localStorage.getItem('geic_conferences')) setDB('geic_conferences', []);
        }

        // --- 2. LOGIC ĐIỀU HƯỚNG TAB ---
        function switchTab(tabId) {
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            event.currentTarget.classList.add('active');
            const container = document.getElementById('main-tab-container');
            const header = document.getElementById('header-title');

            if(tabId === 'tong-quan') {
                header.innerText = "Tổng quan (Dashboard)";
                renderOverview(container);
            } 
            else if(tabId === 'quy-trinh') {
                header.innerText = "Quy trình Vận hành";
                renderProcess(container);
            }
            else if(tabId === 'bao-cao') {
                header.innerText = "Báo cáo & Phân tích (Sales / Đại lý)";
                renderReports(container);
            }
            else if(tabId === 'hoi-nghi') {
                header.innerText = "Quản lý Hội nghị & Hậu cần";
                renderConference(container);
            }
            else if(tabId === 'ho-tro') {
                header.innerText = "Hỗ trợ & Xử lý sự cố";
                renderSupport(container);
            }
        }

        // --- 3. RENDER TAB: TỔNG QUAN ---
        function renderOverview(container) {
            const reports = getDB('geic_reports');
            const confs = getDB('geic_conferences');
            
            let totalTiecCan = 0, totalHopDong = 0, totalLapDat = 0;
            reports.forEach(r => { 
                totalTiecCan += parseInt(r.tiepCan)||0; 
                totalHopDong += parseInt(r.hopDong)||0; 
                totalLapDat += parseInt(r.lapDat)||0; 
            });

            container.innerHTML = `
                <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
                    <div class="glass-panel p-6 rounded-3xl border-l-4 border-blue-500 hover-5d">
                        <p class="text-xs font-bold text-slate-400 uppercase">Khách tiếp cận</p>
                        <h3 class="text-4xl font-black mt-2 text-slate-800">${totalTiecCan}</h3>
                    </div>
                    <div class="glass-panel p-6 rounded-3xl border-l-4 border-amber-500 hover-5d">
                        <p class="text-xs font-bold text-slate-400 uppercase">Hợp đồng đã lên</p>
                        <h3 class="text-4xl font-black mt-2 text-slate-800">${totalHopDong}</h3>
                    </div>
                    <div class="glass-panel p-6 rounded-3xl border-l-4 border-emerald-500 hover-5d">
                        <p class="text-xs font-bold text-slate-400 uppercase">Đã lắp đặt</p>
                        <h3 class="text-4xl font-black mt-2 text-emerald-600">${totalLapDat}</h3>
                    </div>
                    <div class="glass-panel p-6 rounded-3xl border-l-4 border-purple-500 hover-5d">
                        <p class="text-xs font-bold text-slate-400 uppercase">Hội nghị đã lên lịch</p>
                        <h3 class="text-4xl font-black mt-2 text-slate-800">${confs.length}</h3>
                    </div>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                    <div class="glass-panel p-6 rounded-3xl">
                        <h3 class="font-black text-lg mb-4 text-slate-800"><i class="fas fa-clipboard-list text-blue-500 mr-2"></i> Đầu việc cần làm</h3>
                        <div class="space-y-3">
                            <div class="p-4 bg-slate-50 border border-slate-100 rounded-2xl flex justify-between items-center">
                                <div><p class="font-bold text-sm text-slate-800">Check báo cáo Sale hằng ngày</p><p class="text-xs text-slate-500">Mục Báo cáo & Phân tích</p></div>
                                <button onclick="switchTab('bao-cao')" class="text-blue-600 bg-blue-50 px-3 py-1.5 rounded-lg text-xs font-bold hover:bg-blue-100">Xử lý</button>
                            </div>
                            <div class="p-4 bg-slate-50 border border-slate-100 rounded-2xl flex justify-between items-center">
                                <div><p class="font-bold text-sm text-slate-800">Tổng hợp chi phí Hội nghị</p><p class="text-xs text-slate-500">Kế toán đang chờ duyệt</p></div>
                                <button onclick="switchTab('hoi-nghi')" class="text-purple-600 bg-purple-50 px-3 py-1.5 rounded-lg text-xs font-bold hover:bg-purple-100">Xử lý</button>
                            </div>
                        </div>
                    </div>
                    
                    <div class="glass-panel p-6 rounded-3xl bg-slate-800 text-white border-slate-700">
                        <h3 class="font-black text-lg mb-4 text-amber-400"><i class="fas fa-robot mr-2"></i> AI Insight Tổng quan</h3>
                        <p class="text-sm text-slate-300 leading-relaxed">
                            ${totalHopDong > 0 ? `Tỷ lệ chuyển đổi từ Hợp đồng sang Lắp đặt hiện là <b>${Math.round((totalLapDat/totalHopDong)*100)}%</b>.` : 'Hệ thống chưa có dữ liệu Hợp đồng để phân tích.'} 
                            <br><br>
                            Hãy đảm bảo các Đại lý cập nhật trạng thái lắp đặt trên hệ thống gsafe.com.vn. Sắp tới có <b>${confs.length}</b> hội nghị cần chuẩn bị hậu cần.
                        </p>
                    </div>
                </div>
            `;
        }

        // --- 4. RENDER TAB: QUY TRÌNH (5D BOXES) ---
        function renderProcess(container) {
            const saleFlow =[
                { name: "Tiếp nhận thông tin", desc: "Zalo | Tương tác: Sale - Khách hàng", color: "blue" },
                { name: "Xử lý thông tin", desc: "Zalo | Tương tác: Sale - KH - Admin", color: "indigo" },
                { name: "Lên đơn hàng", desc: "gsafe.com.vn | Tương tác: Sale - Admin", color: "purple" },
                { name: "Ký hợp đồng", desc: "vnedoc | Tương tác: Sale - Khách hàng", color: "pink" },
                { name: "Hỗ trợ lắp đặt", desc: "Group Zalo GEIC - FTEL SG | Sale - Kỹ thuật", color: "emerald" },
                { name: "Thanh toán", desc: "Zalo | Tương tác: Sale - KH - Admin", color: "amber" }
            ];

            const agentFlow =[
                { name: "Tiếp nhận thông tin", desc: "Zalo | Đại lý - Khách hàng", color: "blue" },
                { name: "Xử lý thông tin", desc: "Zalo | Đại lý - KH - QL Kiệt Phạm - Admin", color: "indigo" },
                { name: "Lên đơn hàng", desc: "gsafe.com.vn | Đại lý - QL Kiệt Phạm - Admin", color: "purple" },
                { name: "Ký hợp đồng", desc: "vnedoc | Đại lý - QL Kiệt Phạm - KH", color: "pink" },
                { name: "Hỗ trợ lắp đặt", desc: "Group Zalo [Khu vực] - GEIC x Tên Đại lý | ĐL - KT - QL - KT Geic", color: "emerald" },
                { name: "Thanh toán", desc: "Zalo | Đại lý - KH - Admin - QL Kiệt Phạm", color: "amber" }
            ];

            const generateBoxes = (flow) => flow.map((step, i) => `
                <div class="glass-panel p-6 rounded-2xl hover-5d relative border-t-4 border-${step.color}-500 bg-white">
                    <div class="step-number bg-gradient-to-br from-${step.color}-500 to-${step.color}-600 border-2 border-white">${i+1}</div>
                    <h4 class="font-black text-slate-800 text-sm mb-2 mt-1">${step.name}</h4>
                    <p class="text-xs text-slate-500 font-medium leading-relaxed bg-slate-50 p-2 rounded-lg border border-slate-100">${step.desc}</p>
                </div>
            `).join('');

            container.innerHTML = `
                <div class="mb-10">
                    <h2 class="text-2xl font-black text-blue-800 mb-6 flex items-center"><i class="fas fa-user-tie mr-3"></i>Quy trình cho Sale</h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 pl-4">
                        ${generateBoxes(saleFlow)}
                    </div>
                </div>
                <hr class="border-slate-200 mb-10">
                <div>
                    <h2 class="text-2xl font-black text-rose-800 mb-6 flex items-center"><i class="fas fa-store mr-3"></i>Quy trình cho Đại lý</h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 pl-4">
                        ${generateBoxes(agentFlow)}
                    </div>
                </div>
            `;
        }

        // --- 5. RENDER TAB: BÁO CÁO & PHÂN TÍCH ---
        function renderReports(container) {
            container.innerHTML = `
                <!-- Dashboard Tóm tắt -->
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-8">
                    <div class="lg:col-span-2 glass-panel p-6 rounded-3xl">
                        <h3 class="font-black text-slate-800 mb-4"><i class="fas fa-chart-bar text-blue-500 mr-2"></i> Biểu đồ Phân tích Dữ liệu</h3>
                        <div class="h-48"><canvas id="reportChart"></canvas></div>
                    </div>
                    <div class="glass-panel p-6 rounded-3xl bg-blue-50/50 border border-blue-100">
                        <h3 class="font-black text-blue-800 mb-3"><i class="fas fa-robot mr-2"></i> AI Đánh giá</h3>
                        <div id="ai-report-eval" class="text-sm text-slate-600 font-medium leading-relaxed bg-white p-4 rounded-xl shadow-sm border border-slate-100">Đang phân tích...</div>
                        
                        <h3 class="font-black text-slate-800 mt-6 mb-2 text-sm">Tài nguyên Link bổ trợ</h3>
                        <div class="flex gap-2">
                            <input type="text" value="https://gsafe.com.vn/admin" readonly class="w-full text-xs bg-white border border-slate-200 rounded-lg px-2 py-1 outline-none text-slate-500">
                            <button onclick="copyText('https://gsafe.com.vn/admin')" class="px-3 bg-slate-200 hover:bg-slate-300 rounded-lg text-xs font-bold transition"><i class="fas fa-copy"></i></button>
                            <a href="https://gsafe.com.vn/admin" target="_blank" class="px-3 bg-blue-100 text-blue-600 hover:bg-blue-200 rounded-lg flex items-center text-xs font-bold transition"><i class="fas fa-external-link-alt"></i></a>
                        </div>
                    </div>
                </div>

                <!-- Tiện ích Copy Kịch bản -->
                <div class="glass-panel p-5 rounded-2xl mb-8 flex items-center justify-between bg-emerald-50/50 border border-emerald-100">
                    <div>
                        <h4 class="font-black text-emerald-800 text-sm">Kịch bản Báo cáo cho Trưởng phòng KV Miền Nam</h4>
                        <p class="text-xs text-emerald-600 mt-1">Dùng để nhắn tin Zalo nhanh cuối ngày.</p>
                    </div>
                    <button onclick="copyScriptReport()" class="px-4 py-2 bg-emerald-500 text-white font-bold text-sm rounded-xl hover:bg-emerald-600 shadow-sm transition"><i class="fas fa-copy mr-2"></i> Copy Kịch bản</button>
                </div>

                <!-- Khu vực Nhập liệu & Bảng -->
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                    <div class="glass-panel p-6 rounded-3xl">
                        <h3 class="font-black text-slate-800 mb-4 text-sm uppercase tracking-wider border-b border-slate-100 pb-2">Submit Báo cáo Đại lý</h3>
                        <form id="reportForm" onsubmit="handleReportSubmit(event)" class="space-y-4">
                            <div><label class="block text-[11px] font-bold text-slate-500 uppercase mb-1">Tên Đại lý</label><input type="text" id="r_name" required class="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-sm outline-none focus:border-blue-400"></div>
                            <div class="grid grid-cols-2 gap-3">
                                <div><label class="block text-[11px] font-bold text-slate-500 uppercase mb-1">Ngày BC</label><input type="date" id="r_date" required class="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-sm outline-none"></div>
                                <div><label class="block text-[11px] font-bold text-slate-500 uppercase mb-1">Tháng</label><input type="number" id="r_month" min="1" max="12" required class="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-sm outline-none" placeholder="VD: 10"></div>
                            </div>
                            <div class="grid grid-cols-2 gap-3">
                                <div><label class="block text-[11px] font-bold text-blue-500 uppercase mb-1">Tiếp cận</label><input type="number" id="r_tc" required class="w-full bg-blue-50 border border-blue-100 rounded-lg px-3 py-2 text-sm outline-none"></div>
                                <div><label class="block text-[11px] font-bold text-amber-500 uppercase mb-1">Hợp đồng</label><input type="number" id="r_hd" required class="w-full bg-amber-50 border border-amber-100 rounded-lg px-3 py-2 text-sm outline-none"></div>
                                <div><label class="block text-[11px] font-bold text-emerald-500 uppercase mb-1">Lắp đặt</label><input type="number" id="r_ld" required class="w-full bg-emerald-50 border border-emerald-100 rounded-lg px-3 py-2 text-sm outline-none"></div>
                                <div><label class="block text-[11px] font-bold text-red-500 uppercase mb-1">Từ chối</label><input type="number" id="r_rej" required class="w-full bg-red-50 border border-red-100 rounded-lg px-3 py-2 text-sm outline-none"></div>
                            </div>
                            <button type="submit" class="w-full py-3 rounded-xl font-bold text-white bg-blue-600 hover:bg-blue-700 shadow-lg transition mt-2">Submit Báo cáo</button>
                        </form>

        function loadReportData() {

            let tc = 0, hd = 0, ld = 0, rej = 0;

            if(data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="7" class="text-center text-slate-400 italic py-8">Chưa có dữ liệu báo cáo</td></tr>`;
            } else {
                data.forEach((item, index) => {
                    tc += parseInt(item.tiepCan); hd += parseInt(item.hopDong); ld += parseInt(item.lapDat); rej += parseInt(item.tuChoi);
                    tbody.innerHTML += `

                        </tr>
                    `;
                });
            }

            const aiText = document.getElementById('ai-report-eval');
            if(tc === 0) aiText.innerHTML = "Chưa có tương tác khách hàng nào. Cần đôn đốc Đại lý.";

                    </div>
                    <h2 class="text-2xl font-black text-slate-800 mb-2">Trung tâm Hỗ trợ & Xử lý sự cố</h2>
                    <p class="text-sm text-slate-500 font-medium">Khu vực đang được GEIC phát triển. Vui lòng liên hệ Admin qua Group Zalo nội bộ nếu hệ thống gặp gián đoạn.</p>
                </div>
            `;
        }

        // --- 8. LOGIC BẢO MẬT XÓA DỮ LIỆU ---
        function requestDelete(type, index) {
            deleteInfo = { type, index };
            document.getElementById('deletePassword').value = '';
            document.getElementById('deleteModal').classList.add('active');
        }

        function executeDelete() {
            const pwd = document.getElementById('deletePassword').value;
            if(pwd !== DEL_PASSWORD) {
                alert('Sai mật khẩu quản trị! Vui lòng thử lại.');
                return;
            }

            let key = '';
            if(deleteInfo.type === 'report') key = 'geic_reports';
            else if(deleteInfo.type === 'car') key = 'geic_cars';
            else if(deleteInfo.type === 'cost') key = 'geic_costs';
            else if(deleteInfo.type === 'conf') key = 'geic_conferences';

            let data = getDB(key);
            data.splice(deleteInfo.index, 1);
            setDB(key, data);
            
            closeModal('deleteModal');
            
            // Render lại UI tương ứng
            if(deleteInfo.type === 'report') loadReportData();
            if(deleteInfo.type === 'car') { loadCarData(); updateConfAI(); }
            if(deleteInfo.type === 'cost') { loadCostData(); updateConfAI(); }
            if(deleteInfo.type === 'conf') { 
                loadConfData(); updateConfAI(); 
                if(window.renderReactCalendar) window.renderReactCalendar();
            }
            alert('Đã xóa dữ liệu thành công!');
        }

        function closeModal(id) {
            document.getElementById(id).classList.remove('active');
        }

    </script>

    <!-- REACT: LỊCH HỘI NGHỊ NĂM 2026 -->
    <script type="text/babel">
        const { useMemo, useState, useEffect } = React;
        const targetYear = 2026;

        const Calendar2026 = () => {
            const [confDates, setConfDates] = useState({});

            // Đọc dữ liệu từ LocalStorage để đánh dấu lên lịch
            useEffect(() => {
                const loadMarks = () => {
                    const rawData = JSON.parse(localStorage.getItem('geic_conferences')) || [];
                    let marks = {};
                    rawData.forEach(item => {
                        const dt = new Date(item.ngaygio);
                        if(dt.getFullYear() === targetYear) {
                            const k = `${dt.getMonth()+1}-${dt.getDate()}`;
                            if(!marks[k]) marks[k] = [];
                            marks[k].push(item.ten);
                        }
                    });
                    setConfDates(marks);
                };
                loadMarks();
            }, []);

            const mNames =["Tháng 1", "Tháng 2", "Tháng 3", "Tháng 4", "Tháng 5", "Tháng 6", "Tháng 7", "Tháng 8", "Tháng 9", "Tháng 10", "Tháng 11", "Tháng 12"];

            return (
                <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 max-h-[600px] overflow-y-auto custom-scrollbar p-2">
                    {mNames.map((n, m) => {
                        const first = new Date(targetYear, m, 1).getDay();
                        const off = first === 0 ? 6 : first - 1;
                        const days = new Date(targetYear, m+1, 0).getDate();
                        const cells = [];
                        
                        for(let i=0; i<off; i++) cells.push(<div key={`b-${i}`}></div>);
                        
                        for(let d=1; d<=days; d++) {
                            const isW = (new Date(targetYear, m, d).getDay() === 0 || new Date(targetYear, m, d).getDay() === 6);
                            const k = `${m+1}-${d}`;
                            const hasConf = confDates[k];

                            let cls = "relative aspect-square flex items-center justify-center text-[10px] font-bold rounded-md border transition-all group cursor-default ";
                            
                            if(hasConf) cls += "bg-emerald-500 text-white shadow-sm border-emerald-400 hover:scale-110 z-10";
                            else if(isW) cls += "bg-slate-50 text-slate-300 border-transparent";
                            else cls += "bg-white border-slate-100 text-slate-500 hover:bg-slate-100";

                            cells.push(
                                <div key={d} className={cls}>
                                    {d}
                                    {hasConf && (
                                        <div className="absolute bottom-full left-1/2 -translate-x-1/2 mb-1 hidden group-hover:block z-50">
                                            <div className="bg-slate-800 text-white text-[9px] p-2 rounded shadow-xl whitespace-nowrap">
                                                <div className="font-black text-emerald-300 mb-1">Lịch Hội Nghị:</div>
                                                {hasConf.map((cName, idx) => <div key={idx}>• {cName}</div>)}
                                            </div>
                                        </div>
                                    )}
                                </div>
                            );
                        }
                        return (
                            <div key={m} className="bg-white p-3 rounded-2xl border border-slate-100 shadow-sm hover:shadow-md transition">
                                <h3 className="text-center font-black uppercase text-[10px] mb-2 text-slate-700 tracking-wider">{n}</h3>
                                <div className="grid grid-cols-7 gap-1 text-center text-[8px] font-bold text-slate-400 mb-1">
                                    {['T2','T3','T4','T5','T6','T7','CN'].map(x => <div key={x}>{x}</div>)}
                                </div>
                                <div className="grid grid-cols-7 gap-1">{cells}</div>
                            </div>
                        );
                    })}
                </div>
            );
        };

        // Hàm trigger re-render từ Vanilla JS
        window.renderReactCalendar = () => {
            const rootEl = document.getElementById('react-calendar-mount');
            if(rootEl) {
                // Hủy render cũ và render mới (Cách thủ công ép React đọc lại LocalStorage)
                if(window.reactRoot) window.reactRoot.unmount();
                window.reactRoot = ReactDOM.createRoot(rootEl);
                window.reactRoot.render(<Calendar2026 />);
            }
        };
    </script>
</body>
